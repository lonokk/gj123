<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資源鏈結 - 臺東榮服工作百寶箱</title>
    <style>
        /* --- 基礎設定 --- */
        body {
            background-color: #fdfbf7; 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            color: #5a5a5a; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px; 
            padding: 30px 20px;
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5); 
            margin-top: 10px;
            margin-bottom: 20px;
            border-top: 5px solid #27ae60; 
        }
        
        /* --- 標題區 --- */
        .header-box { text-align: center; margin-bottom: 25px; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 5px; font-weight: bold; }
        .subtitle { color: #888; font-size: 14px; }

        /* --- 互動式按鈕清單 --- */
        .link-list { display: flex; flex-direction: column; gap: 15px; }
        
        .resource-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            background-color: #fffaf5;
            padding: 16px 20px;
            border-radius: 15px;
            border: 1px solid #ffe0b2;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .resource-btn:hover {
            background-color: #ffe0b2;
            transform: translateY(-3px);
            border-color: #ffcc80;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.15);
        }
        
        /* 全聯專屬配色 */
        .btn-pxmart { background-color: #f4fdf8; border-color: #a9dfbf; }
        .btn-pxmart:hover { background-color: #e8f8f5; border-color: #2ecc71; box-shadow: 0 5px 15px rgba(39, 174, 96, 0.15); }
        .btn-pxmart .main-title { color: #27ae60; }
        
        /* 預留按鈕配色 */
        .btn-empty { background-color: #f9f9f9; border: 1px dashed #ccc; }
        .btn-empty .main-title { color: #888; }
        .btn-empty:hover { transform: none; box-shadow: none; background-color: #f1f1f1; }

        .icon-box { font-size: 28px; margin-right: 15px; min-width: 40px; text-align: center; }
        .text-box { display: flex; flex-direction: column; }
        
        .main-title { font-size: 17px; font-weight: bold; margin-bottom: 5px; color: #d35400; transition: 0.2s; }
        .sub-title { font-size: 13px; color: #666; line-height: 1.4; }

        /* --- 返回按鈕 --- */
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #888;
            text-decoration: none;
            font-size: 15px;
            padding: 12px 0;
            border-radius: 30px;
            background-color: #f0f0f0;
            transition: 0.3s;
            font-weight: bold;
        }
        .back-btn:hover { background-color: #e0e0e0; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        
        <div class="header-box">
            <h1>🔗 資源鏈結</h1>
            <div class="subtitle">各項民間社福資源與補助申請專區</div>
        </div>

        <div class="link-list">
            
            <a href="https://www.pxmart.org.tw/project/1/5" target="_blank" class="resource-btn btn-pxmart">
                <div class="icon-box">🛒</div>
                <div class="text-box">
                    <span class="main-title">全聯慶祥基金會</span>
                    <span class="sub-title">緊急生活扶助、醫療補助、喪葬補助  事故日起3個月內申請</span>
                </div>
            </a>

            <a href="#" class="resource-btn btn-empty">
                <div class="icon-box">🤝</div>
                <div class="text-box">
                    <span class="main-title">資源建置中...</span>
                    <span class="sub-title">後續可新增其他社福基金會連結</span>
                </div>
            </a>

            <a href="#" class="resource-btn btn-empty">
                <div class="icon-box">🤝</div>
                <div class="text-box">
                    <span class="main-title">資源建置中...</span>
                    <span class="sub-title">後續可新增其他社福基金會連結</span>
                </div>
            </a>

            <a href="#" class="resource-btn btn-empty">
                <div class="icon-box">🤝</div>
                <div class="text-box">
                    <span class="main-title">資源建置中...</span>
                    <span class="sub-title">後續可新增其他社福基金會連結</span>
                </div>
            </a>

            <a href="#" class="resource-btn btn-empty">
                <div class="icon-box">🤝</div>
                <div class="text-box">
                    <span class="main-title">資源建置中...</span>
                    <span class="sub-title">後續可新增其他社福基金會連結</span>
                </div>
            </a>

        </div>

        <a href="index.html" class="back-btn">⬅️ 返回首頁</a>

    </div>

</body>
</html>

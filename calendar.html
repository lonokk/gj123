<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行程與待辦事項</title>
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #444;
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 100%; 
            max-width: 800px; /* 行事曆需要比較寬的空間 */
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.15); 
            margin-bottom: 20px;
            border-top: 6px solid #3498db; /* 專業的藍色主題 */
        }
        h2 { 
            color: #2980b9; 
            font-size: 24px; 
            margin-bottom: 25px; 
            text-align: center;
            font-weight: bold;
        }

        /* 待辦事項捷徑按鈕 */
        .tasks-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ebf5fb;
            color: #2980b9;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 25px;
            border: 2px dashed #a9cce3;
            transition: 0.3s;
        }
        .tasks-btn:hover {
            background-color: #2980b9;
            color: #fff;
            border-style: solid;
        }

        /* 行事曆外框 */
        .calendar-wrapper {
            position: relative;
            padding-bottom: 75%; /* 控制行事曆比例 */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid #e1e8ed;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .calendar-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 返回按鈕 */
        .back-btn { 
            display: block; 
            text-align: center; 
            margin-top: 30px; 
            color: #888; 
            text-decoration: none; 
            font-size: 15px; 
            padding: 12px 25px; 
            border-radius: 30px; 
            background-color: #f0f0f0; 
            transition: 0.3s; 
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .back-btn:hover { background-color: #555; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📅 行程與待辦中心</h2>

        <a href="https://calendar.google.com/calendar/u/0/r/tasks" target="_blank" class="tasks-btn">
            ✅ 開啟 Google 待辦事項 (Tasks)
        </a>
        
        <div class="calendar-wrapper">
            <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&bgcolor=%23ffffff&ctz=Asia%2FTaipei&showTitle=0&showPrint=0&showTabs=1&showCalendars=0&showTz=0&src=emgtdHcudGFpd2FuI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&color=%230B8043" frameborder="0" scrolling="no"></iframe>
        </div>

        <a href="index.html" class="back-btn">⬅️ 返回首頁</a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>處內任務看板</title>
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #444;
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 100%; 
            max-width: 600px; 
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.15); 
            margin-bottom: 20px;
            border-top: 6px solid #3498db; 
        }
        h2 { 
            color: #2980b9; 
            font-size: 24px; 
            margin-bottom: 25px; 
            text-align: center;
            font-weight: bold;
        }

        /* --- 任務清單外框與樣式 --- */
        .task-list-box {
            background: #f8f9fa; 
            border: 1px solid #e1e8ed; 
            border-radius: 12px;
            padding: 15px; 
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .task-item {
            display: flex; 
            align-items: flex-start; 
            padding: 15px 0;
            border-bottom: 1px dashed #ddd; 
            font-size: 15px; 
            color: #444;
        }
        .task-item:last-child { 
            border-bottom: none; 
            padding-bottom: 0; 
        }
        
        /* 鎖定的打勾框框 */
        .task-item input[type="checkbox"] {
            margin-top: 4px; 
            margin-right: 12px; 
            width: 18px; 
            height: 18px; 
            cursor: not-allowed; /* 游標變成禁止符號，提示無法點擊 */
        }
        
        /* 狀態標籤 */
        .tag-todo { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; font-weight: bold;}
        .tag-doing { background: #f39c12; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; font-weight: bold;}
        .tag-done { background: #95a5a6; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; font-weight: bold;}
        
        .task-content { flex-grow: 1; line-height: 1.5; }
        .task-done-text { text-decoration: line-through; color: #aaa; }

        /* --- 返回按鈕 --- */
        .back-btn { 
            display: block; 
            text-align: center; 
            margin-top: 30px; 
            color: #888; 
            text-decoration: none; 
            font-size: 15px; 
            padding: 12px 25px; 
            border-radius: 30px; 
            background-color: #f0f0f0; 
            transition: 0.3s; 
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .back-btn:hover { background-color: #555; color: #fff; }

        /* --- 計數器區塊 --- */
        .counter-box {
            margin-top: 25px; 
            padding-top: 15px; 
            border-top: 1px dashed #eee; 
            text-align: center;
        }
        .counter-box span { 
            font-size: 13px; 
            color: #999; 
            margin-bottom: 5px; 
            display: block; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📋 處內任務看板</h2>

        <div class="task-list-box" id="tasks-container">
            <div class="task-item">
                <input type="checkbox" disabled>
                <div class="task-content">
                    <span class="tag-todo">待處理</span> 辦理 115 年度財物研習會 (徐敬詔)
                </div>
            </div>
            
            <div class="task-item">
                <input type="checkbox" disabled>
                <div class="task-content">
                    <span class="tag-doing">進行中</span> 榮院安心御老教育訓練準備 (高士傑)
                </div>
            </div>
            
            <div class="task-item">
                <input type="checkbox" checked disabled>
                <div class="task-content task-done-text">
                    <span class="tag-done">已完成</span> 提交 3 月份第 1 週工作管制表
                </div>
            </div>
        </div>

        <a href="index.html" class="back-btn">⬅️ 返回首頁</a>

        <div class="counter-box">
            <span>累積瀏覽人次</span>
            <img src="https://api.visitorbadge.io/api/visitors?path=taitung-tasks&countColor=%233498db" alt="瀏覽計數器">
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>處內任務看板</title>
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #444;
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 100%; 
            max-width: 600px; 
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(52, 152, 219, 0.15); 
            margin-bottom: 20px;
            border-top: 6px solid #3498db; 
        }
        h2 { 
            color: #2980b9; 
            font-size: 24px; 
            margin-bottom: 25px; 
            text-align: center;
            font-weight: bold;
        }

        /* --- 任務清單外框與樣式 --- */
        .task-list-box {
            background: #f8f9fa; 
            border: 1px solid #e1e8ed; 
            border-radius: 12px;
            padding: 15px; 
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        .task-item {
            display: flex; 
            align-items: flex-start; 
            padding: 15px 0;
            border-bottom: 1px dashed #ddd; 
            font-size: 15px; 
            color: #444;
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item:last-child { 
            border-bottom: none; 
            padding-bottom: 0; 
        }
        
        /* 鎖定的打勾框框 */
        .task-item input[type="checkbox"] {
            margin-top: 4px; 
            margin-right: 12px; 
            width: 18px; 
            height: 18px; 
            cursor: not-allowed; 
        }
        
        /* 狀態標籤 */
        .tag-todo { background: #e74c3c; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; font-weight: bold;}
        .tag-doing { background: #f39c12; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; font-weight: bold;}
        .tag-done { background: #95a5a6; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; margin-right: 8px; font-weight: bold;}
        
        .task-content { flex-grow: 1; line-height: 1.5; }
        .task-done-text { text-decoration: line-through; color: #aaa; }

        /* --- 返回按鈕 --- */
        .back-btn { 
            display: block; 
            text-align: center; 
            margin-top: 30px; 
            color: #888; 
            text-decoration: none; 
            font-size: 15px; 
            padding: 12px 25px; 
            border-radius: 30px; 
            background-color: #f0f0f0; 
            transition: 0.3s; 
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .back-btn:hover { background-color: #555; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📋 處內任務看板</h2>

        <div class="task-list-box" id="tasks-container">
            <div style="text-align:center; color:#888; padding: 20px;">⏳ 正在同步雲端任務資料...</div>
        </div>

        <a href="index.html" class="back-btn">⬅️ 返回首頁</a>
    </div>

    <script>
        // 🌟 串接您專屬的 Google 試算表 CSV 網址
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThjJ2hCKz83LQLF4x7gnejAfRzHDFP8ziHSUyIk94PXbioHzTgPcdHu5mZxrTN9t0bu8JNNFLluouZ/pub?output=csv';

        async function loadTasks() {
            const container = document.getElementById('tasks-container');

            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.trim().split('\n');
                
                let htmlContent = '';

                // 如果只有標題列，沒有資料
                if (rows.length <= 1) {
                    container.innerHTML = '<div style="text-align:center; color:#888; padding: 20px;">目前沒有任何任務喔！</div>';
                    return;
                }

                // 從第 2 列開始讀取 (第 1 列是標題：狀態, 任務名稱, 負責人)
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 3) {
                        const status = cols[0].replace(/^"|"$/g, '').trim();
                        const taskName = cols[1].replace(/^"|"$/g, '').trim();
                        const owner = cols[2].replace(/^"|"$/g, '').trim();

                        // 判斷狀態與對應的視覺樣式
                        let tagClass = 'tag-todo'; // 預設紅色：待處理
                        let isChecked = '';
                        let textClass = '';

                        if (status === '進行中') {
                            tagClass = 'tag-doing'; // 橘色
                        } else if (status === '已完成') {
                            tagClass = 'tag-done';  // 灰色，且打勾並畫刪除線
                            isChecked = 'checked';
                            textClass = 'task-done-text';
                        }

                        // 將資料畫成一條一條的 HTML 任務
                        htmlContent += `
                            <div class="task-item">
                                <input type="checkbox" disabled ${isChecked}>
                                <div class="task-content ${textClass}">
                                    <span class="${tagClass}">${status}</span> ${taskName} (${owner})
                                </div>
                            </div>
                        `;
                    }
                }
                
                // 把組裝好的任務放入網頁
                container.innerHTML = htmlContent;

            } catch (error) {
                console.error('讀取失敗:', error);
                container.innerHTML = '<div style="text-align:center; color:#e74c3c; padding: 20px;">❌ 讀取資料失敗，請檢查網路連線或試算表設定。</div>';
            }
        }

        // 網頁一打開就自動載入任務
        window.onload = loadTasks;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺東榮服 工作百寶箱</title>
    <style>
        /* --- 基礎設定 --- */
        body {
            background-color: #fdfbf7; 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            color: #5a5a5a; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* 改為 flex-start 讓內容由上往下排，避免手機版被裁切 */
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px; 
            padding: 40px;
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5); 
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        h1 { color: #e67e22; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 15px; line-height: 1.6; color: #888; margin-bottom: 25px; }
        
        /* --- 行事曆區塊樣式 (取代原本的重點工作) --- */
        .calendar-wrapper {
            width: 100%;
            height: 350px; /* 控制行事曆高度 */
            background: #f8f9fa; 
            border: 1px solid #e1e8ed; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); 
            overflow: hidden; /* 確保圓角不會被 iframe 蓋住 */
        }
        .calendar-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- 主選單按鈕 --- */
        .menu { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            display: block;
            text-decoration: none;
            background-color: #fff0e6; 
            color: #d35400; 
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease; 
            border: 1px solid transparent;
        }
        .btn:hover {
            background-color: #ffe0b2; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(255, 160, 122, 0.3);
        }
        
        .btn-red { background-color: #fdedec; color: #c0392b; }
        .btn-red:hover { background-color: #fadbd8; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>

    <div class="card">
        <h1>👋 Hello, 歡迎工作伙伴！</h1>
        <p>這是 臺東榮服 工作百寶箱<br>保管工作常用的工具與道具</p>

        <div class="calendar-wrapper">
            <iframe src="https://calendar.google.com/calendar/embed?showTitle=0&showNav=1&showDate=1&showPrint=0&showTabs=0&showCalendars=0&showTz=0&mode=AGENDA&height=400&wkst=Asia%2FTaipei&src=79a75b4dff2526a087754205619abf49ba5a910d9cd329ab7a39fa6f3bdac4a0%40group.calendar.google.com&color=%23d35400&ctz=Asia%2FTaipei" frameborder="0" scrolling="no"></iframe>
        </div>

        <div class="menu">
            <a href="preparation.html" class="btn">📋 常用網站</a>
            <a href="work.html" class="btn">🛠️ 工作項目</a>
            <a href="anxin-guide.html" class="btn">📚 安心御老操作指南</a>
            <a href="workpoint.html" class="btn">📢 業務宣導</a>
            <a href="antifraud.html" class="btn btn-red">🛡️ 防騙宣導</a>
        </div>
    </div>

</body>
</html>

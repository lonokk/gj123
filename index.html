<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺東榮服 工作百寶箱</title>
    <style>
        /* --- 基礎設定 --- */
        body {
            background-color: #fdfbf7; 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            color: #5a5a5a; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px; 
            padding: 40px;
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5); 
            text-align: center;
        }
        h1 { color: #e67e22; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 15px; line-height: 1.6; color: #888; margin-bottom: 25px; }
        
        /* --- 任務看板樣式 --- */
        .task-list-box { 
            background: #f8f9fa; 
            border: 1px solid #e1e8ed; 
            border-radius: 12px; 
            padding: 15px; 
            margin-bottom: 25px; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); 
            text-align: left; 
        }
        .task-list-title { 
            font-size: 15px; 
            font-weight: bold; 
            color: #3498db; 
            margin-bottom: 10px; 
            border-bottom: 1px dashed #ddd; 
            padding-bottom: 8px; 
            text-align: center; 
        }
        
        #tasks-container {
            max-height: 220px; 
            overflow-y: auto;  
            padding-right: 5px; 
        }
        
        #tasks-container::-webkit-scrollbar { width: 6px; }
        #tasks-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        #tasks-container::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }
        #tasks-container::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .task-item { 
            display: flex; 
            align-items: flex-start; 
            padding: 10px 0; 
            border-bottom: 1px dashed #ddd; 
            font-size: 14px; 
            color: #444; 
            animation: fadeIn 0.5s ease-in-out; 
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .task-item:last-child { border-bottom: none; padding-bottom: 0; }
        
        .task-item input[type="checkbox"] { margin-top: 3px; margin-right: 10px; width: 16px; height: 16px; cursor: not-allowed; }
        
        .tag-todo { background: #e74c3c; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 6px; font-weight: bold;}
        .tag-doing { background: #f39c12; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 6px; font-weight: bold;}
        .tag-done { background: #95a5a6; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; margin-right: 6px; font-weight: bold;}
        
        .task-content { flex-grow: 1; line-height: 1.4; }
        .task-done-text { text-decoration: line-through; color: #aaa; }

        /* --- 主選單按鈕 --- */
        .menu { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            display: block;
            text-decoration: none;
            background-color: #fff0e6; 
            color: #d35400; 
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease; 
            border: 1px solid transparent;
        }
        .btn:hover {
            background-color: #ffe0b2; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(255, 160, 122, 0.3);
        }
        
        .btn-red { background-color: #fdedec; color: #c0392b; }
        .btn-red:hover { background-color: #fadbd8; box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3); }
    </style>
</head>
<body>

    <div class="card">
        <h1>👋 Hello, 歡迎工作伙伴！</h1>
        <p>這是 臺東榮服 工作百寶箱<br>保管工作常用的工具與道具</p>

        <div class="task-list-box">
            <div class="task-list-title">📋 重點工作</div>
            <div id="tasks-container">
                <div style="text-align:center; color:#888; padding: 10px; font-size: 14px;">⏳ 正在同步雲端任務...</div>
            </div>
        </div>

        <div class="menu">
            <a href="preparation.html" class="btn">📋 事前準備</a>
            <a href="work.html" class="btn">🛠️ 工作項目</a>
            <a href="#" class="btn">📚 相關文書</a>
            <a href="workpoint.html" class="btn">📢 業務宣導</a>
            <a href="antifraud.html" class="btn btn-red">🛡️ 防騙宣導</a>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vThjJ2hCKz83LQLF4x7gnejAfRzHDFP8ziHSUyIk94PXbioHzTgPcdHu5mZxrTN9t0bu8JNNFLluouZ/pub?output=csv';

        async function loadTasks() {
            const container = document.getElementById('tasks-container');

            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const rows = csvText.trim().split('\n');
                
                if (rows.length <= 1) {
                    container.innerHTML = '<div style="text-align:center; color:#888; padding: 10px; font-size: 14px;">✅ 目前沒有待辦任務！</div>';
                    return;
                }

                // 1. 先把資料抓下來變成陣列 (Array)
                let parsedTasks = [];
                for (let i = 1; i < rows.length; i++) {
                    const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 3) {
                        parsedTasks.push({
                            status: cols[0].replace(/^"|"$/g, '').trim(),
                            taskName: cols[1].replace(/^"|"$/g, '').trim(),
                            owner: cols[2].replace(/^"|"$/g, '').trim(),
                            originalIndex: i // 記錄原本在試算表是第幾列
                        });
                    }
                }

                // 2. 啟動排序大腦 (自動排序邏輯)
                parsedTasks.sort((a, b) => {
                    const aIsDone = (a.status === '已完成');
                    const bIsDone = (b.status === '已完成');

                    // 規則一：已完成的往下沉
                    if (aIsDone && !bIsDone) return 1;
                    if (!aIsDone && bIsDone) return -1;

                    // 規則二：同狀態下，最新寫上去的 (列數最大的) 排在最上面
                    return b.originalIndex - a.originalIndex;
                });

                // 3. 把排序好的資料畫到網頁上
                let htmlContent = '';
                parsedTasks.forEach(task => {
                    let tagClass = 'tag-todo'; 
                    let isChecked = '';
                    let textClass = '';

                    if (task.status === '進行中') {
                        tagClass = 'tag-doing';
                    } else if (task.status === '已完成') {
                        tagClass = 'tag-done'; 
                        isChecked = 'checked';
                        textClass = 'task-done-text';
                    }

                    htmlContent += `
                        <div class="task-item">
                            <input type="checkbox" disabled ${isChecked}>
                            <div class="task-content ${textClass}">
                                <span class="${tagClass}">${task.status}</span> ${task.taskName} (${task.owner})
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = htmlContent;

            } catch (error) {
                console.error('讀取失敗:', error);
                container.innerHTML = '<div style="text-align:center; color:#e74c3c; padding: 10px; font-size: 14px;">❌ 讀取資料失敗，請檢查網路連線。</div>';
            }
        }

        window.onload = loadTasks;
    </script>
</body>
</html>

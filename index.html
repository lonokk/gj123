<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺東榮服 工作百寶箱</title>
    <style>
        body {
            background-color: #fdfbf7; 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            color: #5a5a5a; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px; 
            padding: 40px;
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5); 
            text-align: center;
        }
        h1 { color: #e67e22; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 15px; line-height: 1.6; color: #888; margin-bottom: 30px; }
        .menu { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            display: block;
            text-decoration: none;
            background-color: #fff0e6; 
            color: #d35400; 
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease; 
            border: 1px solid transparent;
        }
        .btn:hover {
            background-color: #ffe0b2; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(255, 160, 122, 0.3);
        }
        
        /* 針對防騙宣導特別設計的紅色按鈕 */
        .btn-red {
            background-color: #fdedec;
            color: #c0392b;
        }
        .btn-red:hover {
            background-color: #fadbd8;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.3);
        }

        /* 計數器區塊樣式 (給您預備放到底部的樣式) */
        .counter-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
            text-align: center;
        }
        .counter-box span {
            font-size: 13px;
            color: #999;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>👋 Hello, 歡迎工作伙伴！</h1>
        <p>這是 臺東榮服 工作百寶箱<br>保管工作上常用的道具與規定</p>

        <div class="menu">
            <a href="preparation.html" class="btn">📋 事前準備</a>
            <a href="work.html" class="btn">🛠️ 工作項目</a>
            <a href="#" class="btn">📚 相關文書</a>
            <a href="workpoint.html" class="btn">📢 業務宣導</a>
            <a href="antifraud.html" class="btn btn-red">🛡️ 防騙宣導</a>
            <a href="calendar.html" class="btn" style="background-color: #ebf5fb; color: #2980b9;">📅 行程與待辦事項</a>
        </div>

        </div>

</body>
</html>

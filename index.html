<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>臺東榮服 工作百寶箱</title>
    <style>
        /* --- 基礎設定 --- */
        body {
            background-color: #fdfbf7; 
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif; 
            color: #5a5a5a; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px; 
            padding: 40px;
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5); 
            text-align: center;
            margin-top: 10px;
            margin-bottom: 20px;
            position: relative; /* 為了讓計數器好定位 */
        }
        h1 { color: #e67e22; font-size: 24px; margin-bottom: 10px; }
        p { font-size: 15px; line-height: 1.6; color: #888; margin-bottom: 25px; }

        /* --- 主選單按鈕 --- */
        .menu { display: flex; flex-direction: column; gap: 15px; }
        
        /* 預設一般按鈕 (柔和橘底無邊框) */
        .btn {
            display: block;
            text-decoration: none;
            background-color: #fff0e6; 
            color: #d35400; 
            padding: 15px 20px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease; 
            border: 2px solid transparent; 
        }
        .btn:hover {
            background-color: #ffe0b2; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(255, 160, 122, 0.3);
        }

        /* ✨ 突顯項目一：安心御老操作指南 (科技藍 + 粗邊框立體感) ✨ */
        .btn-anxin {
            background-color: #e8f0fe;
            color: #1967d2;
            border: 2px solid #aecbfa;
            box-shadow: 0 4px 10px rgba(25, 103, 210, 0.15);
        }
        .btn-anxin:hover {
            background-color: #d2e3fc;
            border-color: #8ab4f8;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(25, 103, 210, 0.3);
        }

        /* ✨ 突顯項目二：防騙宣導 (警示紅 + 粗邊框立體感) ✨ */
        .btn-antifraud {
            background-color: #fce8e6;
            color: #c5221f;
            border: 2px solid #f28b82;
            box-shadow: 0 4px 10px rgba(197, 34, 31, 0.15);
        }
        .btn-antifraud:hover {
            background-color: #fad2cf;
            border-color: #e6b8af;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(197, 34, 31, 0.3);
        }
    </style>
</head>
<body>

    <div class="card">

                <span style="font-size: 24px; margin-right: 12px;">📆</span> 服務體系行事曆
            </a>
            <div style="text-align: center; font-size: 12.5px; color: #888; margin-top: 8px;">💡 另開視窗、手機可打橫觀看</div>
        </div>

        <div class="menu">
            <a href="preparation.html" class="btn">📋 常用網站</a>
            <a href="work.html" class="btn">🛠️ 工作項目</a>
            
            <a href="anxin-guide.html" class="btn btn-anxin">📚 安心御老操作指南</a>
            
            <a href="resources.html" class="btn">🔗 資源鏈結</a>
            
            <a href="workpoint.html" class="btn">📢 業務宣導</a>
            
            <a href="antifraud.html" class="btn btn-antifraud">🛡️ 防騙宣導</a>

</body>

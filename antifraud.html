<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防騙宣導網</title>
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", sans-serif;
            color: #444;
            margin: 0; 
            padding: 20px;
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            width: 100%; 
            max-width: 450px; /* 稍微縮小寬度，讓 FB 貼文比例更好看 */
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(231, 76, 60, 0.15); 
            margin-bottom: 20px;
            border-top: 6px solid #e74c3c; 
            text-align: center;
        }
        h2 { 
            color: #c0392b; 
            font-size: 24px; 
            margin-bottom: 15px; 
            font-weight: bold;
        }
        
        /* ✨ 動態時間顯示區塊 ✨ */
        .time-display { 
            background-color: #fdedec; 
            color: #c0392b; 
            display: inline-block; 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 14.5px; 
            font-weight: bold; 
            margin-bottom: 25px; 
            border: 1px dashed #fadbd8; 
            letter-spacing: 1px;
        }
        
        /* FB Iframe 容器 */
        .fb-container { 
            background: #f8f9fa; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); 
            border: 1px solid #e1e8ed; 
            display: flex; 
            justify-content: center; 
            padding: 15px 5px; 
        }
        
        /* 返回按鈕 */
        .back-btn { 
            display: inline-block; 
            text-align: center; 
            margin-top: 30px; 
            color: #888; 
            text-decoration: none; 
            font-size: 15px; 
            padding: 12px 25px; 
            border-radius: 30px; 
            background-color: #f0f0f0; 
            transition: 0.3s; 
        }
        .back-btn:hover { background-color: #555; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🛡️ 榮服處防騙宣導網</h2>
        
        <div class="time-display" id="clock">🕒 載入時間中...</div>
        
        <div class="fb-container">
            <iframe src="https://www.facebook.com/plugins/page.php?href=https%3A%2F%2Fwww.facebook.com%2F165bear&tabs=timeline&width=340&height=500&small_header=false&adapt_container_width=true&hide_cover=false&show_facepile=false&appId" width="340" height="500" style="border:none;overflow:hidden; max-width: 100%;" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
        </div>

        <a href="index.html" class="back-btn">⬅️ 返回首頁</a>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            
            // 設定日期與時間的格式
            const options = { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit', 
                weekday: 'long', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit', 
                hour12: false // 使用 24 小時制
            };
            
            // 轉換為臺灣在地格式 (例如：2026/03/05 星期四 21:37:22)
            const timeString = now.toLocaleString('zh-TW', options).replace(/,/g, '');
            
            // 將時間寫入網頁中
            document.getElementById('clock').innerText = '🕒 ' + timeString;
        }

        // 網頁一載入就先執行一次，避免出現「載入時間中...」的空窗期
        updateTime();
        
        // 設定每 1000 毫秒 (1 秒) 重新執行一次 updateTime 函數
        setInterval(updateTime, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作項目 - 工作資料夾</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            color: #5a5a5a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5);
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
            border-top: 5px solid #d35400;
        }
        h2 {
            color: #d35400;
            font-size: 24px;
            margin-bottom: 25px;
            border-bottom: 2px solid #ffe0b2;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }
        .link-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .link-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            background-color: #fffaf5;
            color: #555;
            padding: 18px 20px;
            border-radius: 15px;
            border: 1px solid #ffe0b2;
            transition: all 0.2s ease;
            text-align: left;
            position: relative;
            overflow: hidden;
        }
        .icon-box {
            font-size: 28px;
            margin-right: 18px;
            width: 35px;
            text-align: center;
        }
        .text-box {
            display: flex;
            flex-direction: column;
        }
        .main-title {
            font-size: 18px;
            font-weight: bold;
            color: #d35400;
            margin-bottom: 4px;
        }
        .sub-title {
            font-size: 14px;
            color: #888;
            font-weight: normal;
        }
        .link-btn:not(.placeholder):hover {
            background-color: #ffe0b2;
            transform: translateY(-3px);
            border-color: #ffcc80;
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.15);
        }
        .link-btn:not(.placeholder):hover .sub-title {
            color: #bf360c;
        }
        .placeholder {
            background-color: #f9f9f9;
            border: 1px dashed #ddd;
            pointer-events: none;
            cursor: default;
        }
        .placeholder .main-title { color: #aaa; }
        .placeholder .sub-title { color: #ccc; }
        .placeholder .icon-box {
            filter: grayscale(100%);
            opacity: 0.4;
        }
        .back-btn {
            display: inline-block;
            margin-top: 35px;
            color: #888;
            text-decoration: none;
            font-size: 15px;
            padding: 10px 25px;
            border-radius: 30px;
            background-color: #f0f0f0;
            transition: 0.3s;
        }
        .back-btn:hover {
            background-color: #555;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>🛠️ 工作項目</h2>
        
        <div class="link-list">
            
            <a href="visit-service.html" class="link-btn">
                <div class="icon-box">👣</div>
                <div class="text-box">
                    <span class="main-title">訪視服務規範</span>
                    <span class="sub-title">（業務執行與紀錄）</span>
                </div>
            </a>
            
            <a href="emergency-help.html" class="link-btn">
                <div class="icon-box">🚑</div>
                <div class="text-box">
                    <span class="main-title">急難救助 & 慰問</span>
                    <span class="sub-title">（對象資格判定）</span>
                </div>
            </a>

            <a href="workchoice-3.html" class="link-btn">
                <div class="icon-box">🪪</div>
                <div class="text-box">
                    <span class="main-title">榮民權益簡介</span>
                    <span class="sub-title">（各項福利與補助總覽）</span>
                </div>
            </a>

            <a href="workchoice-4.html" class="link-btn">
                <div class="icon-box">➕</div>
                <div class="text-box">
                    <span class="main-title">遺眷權益簡介</span>
                    <span class="sub-title">（遺眷福利與補助總覽）</span>
                </div>
            </a>

        </div>

        <a href="index.html" class="back-btn">⬅️ 回到首頁</a>
    </div>

</body>
</html>

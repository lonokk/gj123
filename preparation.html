<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用網站 - 工作資料夾</title>
    <style>
        /* 延續首頁的暖色系風格 */
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            color: #5a5a5a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 500px; /* 因為字變多了，讓卡片稍微寬一點 */
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5);
            text-align: center;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        h2 {
            color: #d35400;
            font-size: 22px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ffe0b2;
            padding-bottom: 10px;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-btn {
            display: flex;
            align-items: center; /* 垂直居中 */
            text-decoration: none;
            background-color: #fffaf5;
            color: #555;
            padding: 15px 18px; /* 增加一點高度 */
            border-radius: 12px;
            border: 1px solid #eee;
            transition: all 0.2s ease;
            text-align: left;
        }

        /* 圖示區塊 */
        .icon-box {
            font-size: 24px;
            margin-right: 15px;
            width: 30px; /* 固定寬度確保對齊 */
            text-align: center;
        }

        /* 文字區塊 */
        .text-box {
            display: flex;
            flex-direction: column; /* 讓主標題和副標題垂直排列 */
        }

        .main-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 3px;
        }

        .sub-title {
            font-size: 13px; /* 字體縮小 */
            color: #888; /* 顏色變淡 */
            font-weight: normal;
        }

        /* 滑鼠移上去的效果 */
        .link-btn:hover {
            background-color: #ffe0b2;
            transform: translateY(-2px); /* 輕微浮起 */
            border-color: #ffcc80;
            box-shadow: 0 4px 10px rgba(211, 84, 0, 0.1);
        }
        
        /* 讓副標題在 hover 時也稍微變色，增加互動感 */
        .link-btn:hover .sub-title {
            color: #d35400; 
            opacity: 0.8;
        }

        .back-btn {
            display: inline-block;
            margin-top: 25px;
            color: #999;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 15px;
            border-radius: 20px;
            background-color: #f0f0f0;
            transition: 0.3s;
        }
        .back-btn:hover {
            background-color: #e0e0e0;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📋 常用網站</h2>
        
        <div class="link-list">
            <a href="https://vsis.vac.gov.tw/" target="_blank" class="link-btn">
                <div class="icon-box">🖥️</div>
                <div class="text-box">
                    <span class="main-title">訪視系統離線版</span>
                    <span class="sub-title">（訪視系統）</span>
                </div>
            </a>
            
            <a href="https://epaper.vac.gov.tw/" target="_blank" class="link-btn">
                <div class="icon-box">📰</div>
                <div class="text-box">
                    <span class="main-title">榮光雙周刊</span>
                    <span class="sub-title">（協助訂閱）</span>
                </div>
            </a>
            
            <a href="https://mso.taitungcity.gov.tw/Default.aspx" target="_blank" class="link-btn">
                <div class="icon-box">🕊️</div>
                <div class="text-box">
                    <span class="main-title">臺東市公所殯葬服務網</span>
                    <span class="sub-title">（火化、告別式、禮廳）</span>
                </div>
            </a>

            <a href="https://mso.taitungcity.gov.tw/TaitungScroll/login.aspx" target="_blank" class="link-btn">
                <div class="icon-box">🕯️</div>
                <div class="text-box">
                    <span class="main-title">臺東市電子輓額</span>
                    <span class="sub-title">（電子輓聯）</span>
                </div>
            </a>

            <a href="https://ttgis.taitung.gov.tw/m_public/#" target="_blank" class="link-btn">
                <div class="icon-box">🗺️</div>
                <div class="text-box">
                    <span class="main-title">臺東地籍導航通</span>
                    <span class="sub-title">（找門牌、找鄰里、找地號）</span>
                </div>
            </a>

            <a href="https://adrid.moi.gov.tw/internet/singleQuery" target="_blank" class="link-btn">
                <div class="icon-box">📍</div>
                <div class="text-box">
                    <span class="main-title">內政部地址識別碼</span>
                    <span class="sub-title">（找村里別、找大概位子）</span>
                </div>
            </a>

            <a href="https://ecare.mohw.gov.tw/" target="_blank" class="link-btn">
                <div class="icon-box">🛡️</div>
                <div class="text-box">
                    <span class="main-title">社會安全網</span>
                    <span class="sub-title">（通報社會安全網）</span>
                </div>
            </a>

            <a href="https://emic.ttfd.gov.tw/dspost/public/" target="_blank" class="link-btn">
                <div class="icon-box">⚠️</div>
                <div class="text-box">
                    <span class="main-title">臺東災情看板</span>
                    <span class="sub-title">（天災災情資訊彙整）</span>
                </div>
            </a>

            <a href="https://docs.google.com/spreadsheets/d/1QTHl6xTqq9mj0usu_LqGE2fjOqzJCT7QYyjgEQYItg4/edit?gid=441785655#gid=441785655" target="_blank" class="link-btn">
                <div class="icon-box">📦</div>
                <div class="text-box">
                    <span class="main-title">物資統計</span>
                    <span class="sub-title">（本處物資請領）</span>
                </div>
            </a>

            <a href="https://law.vac.gov.tw/vaclaw/" target="_blank" class="link-btn">
                <div class="icon-box">⚖️</div>
                <div class="text-box">
                    <span class="main-title">輔導會主管法規</span>
                    <span class="sub-title">（法規查詢）</span>
                </div>
            </a>
        </div>

        <a href="index.html" class="back-btn">⬅️ 回到首頁</a>
    </div>

</body>
</html>

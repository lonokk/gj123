<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安心御老操作指南</title>
    <style>
        /* --- 基礎設定 --- */
        * { box-sizing: border-box; }
        body {
            background-color: #fdfbf7;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            color: #5a5a5a;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 650px; /* 為了讓三個步驟橫向排列更好看，稍微加寬 */
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(230, 210, 200, 0.5);
            margin-top: 20px;
            margin-bottom: 20px;
            border-top: 5px solid #f39c12; /* 溫暖的橘黃色主題 */
        }
        h2 {
            color: #d35400; 
            font-size: 24px;
            margin-bottom: 25px;
            border-bottom: 2px solid #fdebd0;
            padding-bottom: 15px;
            letter-spacing: 1px;
            text-align: center;
        }

        /* ================= SOP 步驟圖排版 (電腦橫排 / 手機直排) ================= */
        .sop-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            background-color: #fdfefe;
            padding: 25px 15px;
            border-radius: 15px;
            border: 1px solid #fae5d3;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
        }
        
        .h-step {
            flex: 1;
            background: #ffffff;
            text-align: center;
            padding: 20px 10px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.1);
            border-top: 4px solid #f39c12;
            position: relative;
        }

        .h-label {
            background-color: #f39c12;
            color: white;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(243, 156, 18, 0.3);
        }

        .h-main {
            font-weight: bold;
            color: #d35400;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .h-sub {
            font-size: 13px;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .h-arrow {
            color: #f39c12;
            font-size: 24px;
            font-weight: bold;
            margin: 0 10px;
        }

        /* 📱 手機版 RWD：自動轉為垂直排列 */
        @media (max-width: 600px) {
            .sop-container {
                flex-direction: column;
                align-items: stretch;
            }
            .h-arrow {
                transform: rotate(90deg); /* 箭頭轉向下 */
                margin: 15px auto;
            }
        }

        /* 返回按鈕 */
        .back-btn { 
            display: block; 
            text-align: center; 
            margin-top: 35px; 
            color: #888; 
            text-decoration: none; 
            font-size: 15px; 
            padding: 12px 25px; 
            border-radius: 30px; 
            background-color: #f0f0f0; 
            transition: 0.3s; 
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .back-btn:hover { background-color: #555; color: #fff; }

        /* 計數器區塊樣式 */
        .counter-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px dashed #eee;
            text-align: center;
        }
        .counter-box span {
            font-size: 13px;
            color: #999;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📱 安心御老操作指南</h2>
        
        <p style="text-align: center; color: #7f8c8d; font-size: 15px; margin-bottom: 25px;">
            臺東縣榮服處服務體系・三層通報協處機制
        </p>

        <div class="sop-container">
            
            <div class="h-step">
                <div class="h-label">第一層</div>
                <div class="h-content">
                    <div class="h-main">社區服務組長<br>即時通報</div>
                </div>
            </div>
            
            <div class="h-arrow">➜</div>
            
            <div class="h-step">
                <div class="h-label">第二層</div>
                <div class="h-content">
                    <div class="h-main">責任區輔導員<br>統籌協調</div>
                </div>
            </div>
            
            <div class="h-arrow">➜</div>
            
            <div class="h-step">
                <div class="h-label">第三層</div>
                <div class="h-content">
                    <div class="h-main">陳報總幹事協處</div>
                    <div class="h-sub">（重大案件陳報處長）</div>
                </div>
            </div>
            
        </div>

        <a href="index.html" class="back-btn">⬅️ 返回首頁</a>

        <div class="counter-box">
            <span>累積瀏覽人次</span>
            <img src="https://api.visitorbadge.io/api/visitors?path=taitung-anxin-guide&countColor=%23f39c12" alt="瀏覽計數器">
        </div>

    </div>

</body>
</html>
